<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px 16px; min-width: 280px; margin: 0; }
    h3 { margin: 0 0 10px; font-size: 14px; color: #333; }
    .account-list { list-style: none; padding: 0; margin: 0; }
    .account-list li {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      border: 1px solid transparent; margin-bottom: 4px;
    }
    .account-list li:hover { background: #f0f4ff; }
    .account-list li.selected { border-color: #1a73e8; background: #e8f0fe; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #dadce0; display: flex; align-items: center;
      justify-content: center; font-size: 13px; color: #5f6368;
      flex-shrink: 0; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .account-info { min-width: 0; }
    .account-name { font-size: 13px; font-weight: 500; color: #202124; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .account-email { font-size: 11px; color: #5f6368; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status { font-size: 12px; color: #188038; margin-top: 8px; min-height: 16px; }
    .error { color: #d93025; }
    .loading { color: #5f6368; font-size: 13px; padding: 16px 0; text-align: center; }
  </style>
</head>
<body>
  <h3>Search as account</h3>
  <div id="content"><div class="loading">Loading accounts…</div></div>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
