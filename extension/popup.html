<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="header-icon" src="icons/icon48.png" alt="">
      <div>
        <div class="header-title">Google AI Scraper</div>
        <div class="header-subtitle">AI Overview relay</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refreshButton" type="button" title="Refresh accounts">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><polyline points="21 3 21 9 15 9"/></svg>
      </button>
      <button class="icon-btn" id="settingsButton" type="button" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <!-- Connection status -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot checking" id="statusDot"></span>
    <span id="connectionLabel">Checking server...</span>
  </div>

  <!-- Summary card for selected account -->
  <section id="summaryCard" class="summary-card" hidden>
    <div id="selectedAvatar" class="avatar summary-avatar">A</div>
    <div class="summary-info">
      <div class="summary-label">Active account</div>
      <div id="selectedName" class="summary-name"></div>
      <div id="selectedEmail" class="summary-email"></div>
    </div>
    <div id="summaryMeta" class="summary-meta"></div>
  </section>

  <!-- Error banner -->
  <div id="banner" class="banner" hidden></div>

  <!-- Account list -->
  <div class="section">
    <div class="section-label">Accounts</div>
    <div id="content"></div>
  </div>

  <!-- Status message -->
  <div id="status" class="status-message" aria-live="polite"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
