<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header class="hero">
        <div>
          <p class="eyebrow">Google AI Scraper</p>
          <h1 class="title">Search account</h1>
          <p class="subtitle">Choose the Google profile used for searches, while keeping refreshes fast with a local cache.</p>
        </div>
        <div class="toolbar">
          <button id="refreshButton" class="toolbar-button" type="button">Refresh</button>
          <button id="settingsButton" class="toolbar-button secondary" type="button">Settings</button>
        </div>
      </header>

      <div class="meta-row">
        <span id="connectionPill" class="pill tone-pending">Checking server</span>
        <span id="cachePill" class="pill tone-neutral">No cached accounts</span>
      </div>
      <p id="healthDetail" class="health-detail">Verifying the local relay and extension heartbeat.</p>

      <section id="summaryCard" class="summary-card" hidden>
        <div id="selectedAvatar" class="avatar">A</div>
        <div>
          <div class="summary-label">Active account</div>
          <div id="selectedName" class="summary-name"></div>
          <div id="selectedEmail" class="summary-email"></div>
          <div id="summaryMeta" class="summary-meta"></div>
        </div>
      </section>

      <div id="banner" class="banner" hidden></div>

      <div id="content" class="content"></div>
      <div id="status" class="status tone-neutral" aria-live="polite"></div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
